# CodeRabbit — automated PR reviews (install the GitHub App on the repo)
# https://coderabbit.ai

language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
chat:
  auto_reply: false
